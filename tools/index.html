<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Home Improvement Calculators — DIYCalcKit</title>
  <meta name="description" content="23 free home improvement calculators for paint, flooring, tile, renovation costs, garden, and moving. Instant results, no sign-up required.">
  <link rel="canonical" href="https://diycalckit.com/tools/">
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/assets/css/style.css">
  <script src="/assets/js/nav.js" defer></script>
  <style>
    .search-wrap { max-width: 560px; margin: 0 auto 2rem; }
    .search-wrap input {
      width: 100%; padding: .75rem 1rem; font-size: 1rem;
      border: 2px solid var(--border); border-radius: var(--radius);
      background: var(--white); color: var(--ink);
      outline: none; box-sizing: border-box;
      font-family: 'DM Sans', sans-serif;
    }
    .search-wrap input:focus { border-color: var(--amber); }

    .filter-bar {
      display: flex; gap: .5rem; flex-wrap: wrap;
      justify-content: center; margin-bottom: 2.5rem;
    }
    .filter-btn {
      padding: .4rem 1.1rem;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      font-size: .8rem; font-weight: 600;
      cursor: pointer; background: var(--white);
      color: var(--mid); transition: all .15s;
      font-family: 'DM Sans', sans-serif;
    }
    .filter-btn:hover,
    .filter-btn.active {
      border-color: var(--amber);
      background: var(--amber-light);
      color: var(--amber-dark);
    }

    .tools-section { margin-bottom: 2.5rem; }
    .tools-section-title {
      font-size: .7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .12em;
      color: var(--muted); margin-bottom: 1rem;
    }

    .no-results { text-align: center; color: var(--mid); padding: 3rem 0; display: none; }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5592663499707350" crossorigin="anonymous"></script>
</head>
<body>
<main>
  <div class="hero" style="padding:3.5rem 2rem 3rem;">
    <div class="hero-inner">
      <h1 style="font-size:clamp(1.8rem,4vw,2.8rem)">Home Improvement <em>Calculators</em></h1>
      <p class="hero-sub">23 free calculators — paint, flooring, tile, renovation costs, garden, and moving. Instant results, no sign-up.</p>
    </div>
  </div>

  <section class="section">
    <div class="search-wrap">
      <input type="text" id="toolSearch" placeholder="Search calculators — e.g. paint, tile, mulch…" oninput="filterTools()">
    </div>
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('paint', this)">🎨 Paint & Wallpaper</button>
      <button class="filter-btn" onclick="setFilter('flooring', this)">🪵 Flooring</button>
      <button class="filter-btn" onclick="setFilter('space', this)">📏 Space & Area</button>
      <button class="filter-btn" onclick="setFilter('cost', this)">💰 Renovation Cost</button>
      <button class="filter-btn" onclick="setFilter('garden', this)">🌿 Garden & Outdoor</button>
      <button class="filter-btn" onclick="setFilter('moving', this)">🚚 Moving</button>
    </div>

    <div id="toolsGrid"></div>
    <p class="no-results" id="noResults">No calculators found. Try a different keyword.</p>
  </section>
</main>

<script>
const TOOLS_DATA = [
  // Paint & Wallpaper
  { name: "Paint Calculator", url: "/tools/paint-calculator.html", icon: "🖌️", desc: "How many gallons do you need? Enter room dimensions and get an exact estimate.", cat: "paint" },
  { name: "Wallpaper Calculator", url: "/tools/wallpaper-calculator.html", icon: "🧱", desc: "Calculate rolls needed for any room, including pattern repeat, windows, and doors.", cat: "paint" },
  { name: "Primer Calculator", url: "/tools/primer-calculator.html", icon: "🪣", desc: "Get the right amount of primer for walls, ceilings, or bare surfaces.", cat: "paint" },
  // Flooring
  { name: "Flooring Calculator", url: "/tools/flooring-calculator.html", icon: "📐", desc: "Calculate square footage and materials needed for any flooring type.", cat: "flooring" },
  { name: "Tile Calculator", url: "/tools/tile-calculator.html", icon: "⬜", desc: "Find out how many tiles you need, including waste allowance.", cat: "flooring" },
  { name: "Carpet Calculator", url: "/tools/carpet-calculator.html", icon: "🟫", desc: "Measure carpet needs by room with seam and waste factored in.", cat: "flooring" },
  { name: "Hardwood Floor Calculator", url: "/tools/hardwood-floor-calculator.html", icon: "🌲", desc: "Estimate hardwood boards needed with install angle and waste included.", cat: "flooring" },
  // Space & Area
  { name: "Room Area Calculator", url: "/tools/room-area-calculator.html", icon: "🏠", desc: "Calculate the area of any room shape — square, rectangular, or L-shaped.", cat: "space" },
  { name: "Square Footage Calculator", url: "/tools/square-footage-calculator.html", icon: "📊", desc: "Total up square footage for multiple rooms or an entire floor plan.", cat: "space" },
  { name: "Drywall Calculator", url: "/tools/drywall-calculator.html", icon: "🧱", desc: "How many sheets of drywall for your walls and ceilings? Find out fast.", cat: "space" },
  { name: "Concrete Calculator", url: "/tools/concrete-calculator.html", icon: "⬛", desc: "Calculate cubic yards of concrete needed for slabs, footings, or steps.", cat: "space" },
  // Renovation Cost
  { name: "Renovation Cost Estimator", url: "/tools/renovation-cost-estimator.html", icon: "🔧", desc: "Get a ballpark renovation budget by room type and scope of work.", cat: "cost" },
  { name: "Bathroom Remodel Cost Calculator", url: "/tools/bathroom-remodel-cost-calculator.html", icon: "🚿", desc: "Estimate bathroom renovation costs by size, scope, and finish level.", cat: "cost" },
  { name: "Contractor Cost Calculator", url: "/tools/contractor-cost-calculator.html", icon: "👷", desc: "Estimate what to expect for contractor labor by trade and project size.", cat: "cost" },
  { name: "Home Renovation ROI Calculator", url: "/tools/home-renovation-roi-calculator.html", icon: "📈", desc: "Which projects add the most value to your home? Calculate your return.", cat: "cost" },
  // Garden & Outdoor
  { name: "Fence Calculator", url: "/tools/fence-calculator.html", icon: "🪟", desc: "Posts, panels, and materials for any fence length and style.", cat: "garden" },
  { name: "Deck Size Calculator", url: "/tools/deck-size-calculator.html", icon: "🏡", desc: "Plan deck dimensions and estimate lumber needed for your build.", cat: "garden" },
  { name: "Deck Stain Calculator", url: "/tools/stain-calculator.html", icon: "🪵", desc: "How much deck stain do you need? Enter deck size, coats, and wood condition.", cat: "garden" },
  { name: "Garden Area Calculator", url: "/tools/garden-area-calculator.html", icon: "🌱", desc: "Calculate garden bed area for soil, mulch, or planting planning.", cat: "garden" },
  { name: "Mulch Calculator", url: "/tools/mulch-calculator.html", icon: "🍂", desc: "How many bags or cubic yards of mulch do you need? Find out instantly.", cat: "garden" },
  { name: "Gravel Calculator", url: "/tools/gravel-calculator.html", icon: "🪨", desc: "Calculate cubic yards and tons of gravel for driveways, paths, and garden beds.", cat: "garden" },
  { name: "Soil Calculator", url: "/tools/soil-calculator.html", icon: "🌱", desc: "Calculate bags or cubic yards of soil needed for raised beds and garden beds.", cat: "garden" },
  { name: "Lawn Seed Calculator", url: "/tools/lawn-seed-calculator.html", icon: "🌾", desc: "Calculate grass seed coverage for new lawns or overseeding projects.", cat: "garden" },
  // 신규
  { name: "Grout Calculator", url: "/tools/grout-calculator.html", icon: "🪣", desc: "How many bags of grout do you need? Enter tile size, joint width, and area for an exact bag count.", cat: "flooring" },
  { name: "Paint Cost Calculator", url: "/tools/paint-cost-calculator.html", icon: "💵", desc: "Estimate the total cost to paint a room — paint, primer, supplies, and optional professional labor.", cat: "paint" },
  { name: "Raised Garden Bed Calculator", url: "/tools/raised-garden-bed-calculator.html", icon: "🌿", desc: "Calculate soil, compost, and fill needed for any raised garden bed size and depth.", cat: "garden" },
  // Moving
  { name: "Moving Cost Calculator", url: "/tools/moving-cost-calculator.html", icon: "🚛", desc: "Estimate local or long-distance moving costs based on home size and distance.", cat: "moving" },
  { name: "Storage Unit Size Calculator", url: "/tools/storage-unit-size-calculator.html", icon: "📦", desc: "Find the right storage unit size for your furniture and belongings.", cat: "moving" },
  { name: "Packing Box Calculator", url: "/tools/packing-box-calculator.html", icon: "🗃️", desc: "How many boxes do you need to pack your home? Get a room-by-room estimate.", cat: "moving" },
];

const CATEGORY_LABELS = {
  paint:   "🎨 Paint & Wallpaper",
  flooring:"🪵 Flooring",
  space:   "📏 Space & Area",
  cost:    "💰 Renovation Cost",
  garden:  "🌿 Garden & Outdoor",
  moving:  "🚚 Moving",
};

let currentFilter = 'all';

function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('toolSearch').value = '';
  renderTools(getFiltered('', cat));
}

function filterTools() {
  const q = document.getElementById('toolSearch').value.toLowerCase().trim();
  // 검색 중엔 필터 버튼 all로 리셋
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn').classList.add('active');
  currentFilter = 'all';
  renderTools(getFiltered(q, 'all'));
}

function getFiltered(q, cat) {
  return TOOLS_DATA.filter(t => {
    const matchCat = cat === 'all' || t.cat === cat;
    const matchQ = !q || t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
}

function renderTools(list) {
  const grid = document.getElementById('toolsGrid');
  const noResults = document.getElementById('noResults');

  if (!list.length) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  // 카테고리별로 그룹핑
  const grouped = {};
  list.forEach(t => {
    if (!grouped[t.cat]) grouped[t.cat] = [];
    grouped[t.cat].push(t);
  });

  const catOrder = ['paint','flooring','space','cost','garden','moving'];

  grid.innerHTML = catOrder
    .filter(c => grouped[c])
    .map(c => `
      <div class="tools-section">
        <div class="category-label">${CATEGORY_LABELS[c]}</div>
        <div class="tools-grid">
          ${grouped[c].map(t => `
            <a href="${t.url}" class="tool-card">
              <div class="tool-card-icon">${t.icon}</div>
              <h3>${t.name}</h3>
              <p>${t.desc}</p>
              <span class="tool-card-arrow">Use tool →</span>
            </a>
          `).join('')}
        </div>
      </div>
    `).join('');
}

// 초기 렌더링
renderTools(getFiltered('', 'all'));
</script>
</body>
</html>
