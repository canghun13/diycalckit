<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Improvement Project Guides — DIYCalcKit</title>
  <meta name="description" content="Step-by-step home improvement project guides — painting, flooring, tiling, decks, fences, garden beds, and more. Each guide includes a built-in calculator so you know exactly what to buy.">
  <link rel="canonical" href="https://diycalckit.com/projects/">
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/assets/css/style.css">
  <script src="/assets/js/nav.js" defer></script>
  <style>
    .search-wrap { max-width: 520px; margin: 0 auto 2rem; }
    .search-wrap input {
      width: 100%; padding: .75rem 1rem; font-size: 1rem;
      border: 2px solid var(--border); border-radius: var(--radius);
      background: var(--white); color: var(--ink);
      outline: none; box-sizing: border-box;
      font-family: 'DM Sans', sans-serif;
    }
    .search-wrap input:focus { border-color: var(--amber); }
    .filter-bar { display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center; margin-bottom:2.5rem; }
    .filter-btn {
      padding:.4rem 1.1rem; border:1.5px solid var(--border); border-radius:100px;
      font-size:.8rem; font-weight:600; cursor:pointer; background:var(--white);
      color:var(--mid); transition:all .15s; font-family:'DM Sans',sans-serif;
    }
    .filter-btn:hover, .filter-btn.active { border-color:var(--amber); background:var(--amber-light); color:var(--amber-dark); }
    .no-results { text-align:center; color:var(--mid); padding:3rem 0; display:none; }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5592663499707350" crossorigin="anonymous"></script>
</head>
<body>
<main>
  <div class="hero" style="padding:3.5rem 2rem 3rem;">
    <div class="hero-inner">
      <h1 style="font-size:clamp(1.8rem,4vw,2.8rem)">Home Improvement <em>Project Guides</em></h1>
      <p class="hero-sub">Step-by-step guides for every DIY project — with built-in calculators so you know exactly what to buy before you start.</p>
    </div>
  </div>
  <section class="section">
    <div class="search-wrap">
      <input type="text" id="projectSearch" placeholder="Search projects — e.g. paint, tile, deck…" oninput="filterProjects()">
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('paint',this)">🎨 Paint & Wall</button>
      <button class="filter-btn" onclick="setFilter('flooring',this)">🪵 Flooring</button>
      <button class="filter-btn" onclick="setFilter('tile',this)">⬜ Tile</button>
      <button class="filter-btn" onclick="setFilter('structural',this)">🏗️ Structural</button>
      <button class="filter-btn" onclick="setFilter('outdoor',this)">🌿 Outdoor</button>
      <button class="filter-btn" onclick="setFilter('moving',this)">📋 Moving & Reno</button>
    </div>
    <div id="project-grid" class="tools-grid"></div>
    <p class="no-results" id="noResults">No projects found. Try a different keyword.</p>
  </section>
</main>
<script>
let currentFilter = 'all';
function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('projectSearch').value = '';
  render();
}
function filterProjects() {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn').classList.add('active');
  currentFilter = 'all';
  render();
}
function render() {
  const q = document.getElementById('projectSearch').value.toLowerCase().trim();
  if (typeof PROJECTS === 'undefined') return;
  const list = PROJECTS.filter(p => {
    const matchCat = currentFilter === 'all' || p.cat === currentFilter;
    const matchQ = !q || p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  const grid = document.getElementById('project-grid');
  const noResults = document.getElementById('noResults');
  if (!list.length) { grid.innerHTML = ''; noResults.style.display = 'block'; return; }
  noResults.style.display = 'none';
  grid.innerHTML = list.map(p => `
    <a href="${p.url}" class="tool-card">
      <div class="tool-card-icon">${p.icon}</div>
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
      <span class="tool-card-arrow">See guide →</span>
    </a>
  `).join('');
}
document.addEventListener('DOMContentLoaded', function() { setTimeout(render, 50); });
</script>
</body>
</html>
